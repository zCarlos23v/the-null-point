<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Martelo do Ban</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --danger: #f85149; --sidebar: #0d1117; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .nav-box:hover { background: #30363d; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-top: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-ban { background: var(--danger); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h3>THE NULL POINT</h3>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Voltar ao Site</div>
        <div class="nav-box" style="margin-top: auto; color: var(--danger);" onclick="localStorage.clear(); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <h1>Martelo do Ban 🔨</h1>
        <div class="card">
            <h3>Banir Usuário</h3>
            <p style="color: #8b949e;">Digite o nome do usuário para expulsá-lo do universo.</p>
            <input type="text" id="userToBan" placeholder="Nome do Usuário...">
            <button class="btn-ban" onclick="aplicarBan()">APLICAR BANIMENTO PERMANENTE</button>
        </div>

        <div class="card">
            <h3>Usuários na Lista Negra</h3>
            <div id="listaNegra"></div>
        </div>
    </main>

    <script>
        function aplicarBan() {
            const user = document.getElementById('userToBan').value.trim();
            if(!user) return;
            if(user.toLowerCase() === 'carlos') return alert("O Supremo Criador não pode ser banido!");

            let banidos = JSON.parse(localStorage.getItem('banidos')) || [];
            if(!banidos.includes(user)) {
                banidos.push(user);
                localStorage.setItem('banidos', JSON.stringify(banidos));
                alert("O usuário " + user + " foi mandado para o vácuo!");
                document.getElementById('userToBan').value = "";
                renderBanidos();
            }
        }

        function renderBanidos() {
            const container = document.getElementById('listaNegra');
            const banidos = JSON.parse(localStorage.getItem('banidos')) || [];
            container.innerHTML = banidos.map((u, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #30363d;">
                    <span>🚫 ${u}</span>
                    <button onclick="desbanir(${i})" style="background:gray; color:white; border:none; border-radius:5px; cursor:pointer;">Desbanir</button>
                </div>
            `).join('');
        }

        function desbanir(i) {
            let banidos = JSON.parse(localStorage.getItem('banidos'));
            banidos.splice(i, 1);
            localStorage.setItem('banidos', JSON.stringify(banidos));
            renderBanidos();
        }

        renderBanidos();
    </script>
</body>
</html>
