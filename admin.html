<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; }
        
        /* Switch Bonitão */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h3>CONTROLE TOTAL</h3>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Voltar ao Site</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Ver Ranking</div>
    </aside>

    <main class="main-content">
        <h1>Painel do Criador 👑</h1>

        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3>Modo Global (Ranking)</h3>
                <p style="color: #8b949e; margin: 0;">Se ligado, você aparece no Top Global com seu XP real.</p>
            </div>
            <label class="switch">
                <input type="checkbox" id="checkRanking" onchange="toggleRanking()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card">
            <h3>Martelo do Ban 🔨</h3>
            <input type="text" id="userToBan" placeholder="Nome do usuário..." style="width:80%; padding:10px; background:#0d1117; border:1px solid #333; color:white; border-radius:8px;">
            <button onclick="banir()" style="padding:10px; background:var(--danger); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">BANIR</button>
        </div>
    </main>

    <script>
        // Salva a preferência de aparecer ou não no Ranking
        function toggleRanking() {
            const status = document.getElementById('checkRanking').checked;
            localStorage.setItem('mostrarCriadorNoRanking', status);
            alert(status ? "Você agora está visível no Ranking!" : "Você saiu do Ranking Global.");
        }

        // Carrega o estado atual ao abrir o painel
        document.getElementById('checkRanking').checked = localStorage.getItem('mostrarCriadorNoRanking') === 'true';

        function banir() {
            const user = document.getElementById('userToBan').value;
            if(!user) return;
            let banidos = JSON.parse(localStorage.getItem('banidos')) || [];
            banidos.push(user);
            localStorage.setItem('banidos', JSON.stringify(banidos));
            alert("Mandado para o vácuo!");
        }
    </script>
</body>
</html>
