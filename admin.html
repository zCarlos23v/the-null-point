<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Zero - Admin</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #0d1117; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .main { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        .btn-post { background: var(--primary); color: black; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h3>THE NULL POINT</h3>
        <div onclick="location.href='home.html'" style="cursor:pointer">🏠 Ver Site</div>
        <div onclick="localStorage.removeItem('usuarioLogado'); location.href='index.html'" style="color:var(--danger); cursor:pointer; margin-top:auto">🚪 Sair</div>
    </aside>
    <main class="main">
        <h1>Painel do Criador</h1>
        
        <div class="card">
            <h3>📢 Publicar Nova Notícia</h3>
            <input type="text" id="newsTitle" placeholder="Título da Notícia">
            <textarea id="newsContent" rows="4" placeholder="Conteúdo da notícia..."></textarea>
            <button class="btn btn-post" onclick="postarNoticia()">PUBLICAR NO FEED</button>
        </div>

        <div class="card">
            <h3>⚙️ Controle de XP</h3>
            <input type="number" id="xpInput" value="1">
            <button class="btn" style="background:#30363d; color:white;" onclick="document.getElementById('lvlText').innerText = document.getElementById('xpInput').value">APLICAR</button>
            <p>Nível: <span id="lvlText">1</span></p>
        </div>
    </main>

    <script>
        function postarNoticia() {
            const titulo = document.getElementById('newsTitle').value;
            const texto = document.getElementById('newsContent').value;
            if(!titulo || !texto) return alert("Escreva algo!");

            const novaNoticia = { titulo, texto, data: new Date().toLocaleDateString() };
            
            // Pega as notícias antigas ou cria uma lista vazia
            let lista = JSON.parse(localStorage.getItem('noticias')) || [];
            lista.unshift(novaNoticia); // Adiciona no topo
            localStorage.setItem('noticias', JSON.stringify(lista));

            alert("Notícia enviada ao Universo!");
            document.getElementById('newsTitle').value = "";
            document.getElementById('newsContent').value = "";
        }
    </script>
</body>
</html>
