<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Criador - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --gold: #ffcf40; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-box:hover { background: #30363d; }

        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-post { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .news-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #30363d; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-fix { background: var(--gold); color: black; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">THE NULL POINT</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Meu Perfil</div>
        <div class="nav-box" onclick="location.href='amigos.html'">👥 Amigos</div>
        <div class="nav-box" style="margin-top: auto; color: var(--danger);" onclick="localStorage.clear(); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <h1>Painel do Criador 👑</h1>
        <div class="card">
            <h3>📢 Nova Notícia</h3>
            <input type="text" id="title" placeholder="Título">
            <input type="text" id="img" placeholder="Link da Imagem (URL)">
            <textarea id="text" rows="4" placeholder="Conteúdo..."></textarea>
            <button class="btn-post" onclick="publicar()">PUBLICAR AGORA</button>
        </div>

        <div class="card">
            <h3>📂 Gerenciar Postagens</h3>
            <div id="lista"></div>
        </div>
    </main>

    <script>
        function publicar() {
            const titulo = document.getElementById('title').value;
            const imagem = document.getElementById('img').value;
            const texto = document.getElementById('text').value;
            if(!titulo || !texto) return alert("Preencha título e texto!");

            let lista = JSON.parse(localStorage.getItem('noticias')) || [];
            lista.unshift({ titulo, imagem, texto, data: new Date().toLocaleDateString(), fixada: false });
            localStorage.setItem('noticias', JSON.stringify(lista));
            location.reload();
        }

        function renderAdmin() {
            const container = document.getElementById('lista');
            const lista = JSON.parse(localStorage.getItem('noticias')) || [];
            container.innerHTML = lista.map((n, i) => `
                <div class="news-item">
                    <span>${n.fixada ? '📌 ' : ''}${n.titulo}</span>
                    <div>
                        <button class="btn-fix" onclick="fixar(${i})">Pin</button>
                        <button class="btn-del" onclick="remover(${i})">X</button>
                    </div>
                </div>
            `).join('');
        }

        function fixar(i) {
            let lista = JSON.parse(localStorage.getItem('noticias'));
            lista[i].fixada = !lista[i].fixada;
            lista.sort((a, b) => b.fixada - a.fixada);
            localStorage.setItem('noticias', JSON.stringify(lista));
            renderAdmin();
        }

        function remover(i) {
            let lista = JSON.parse(localStorage.getItem('noticias'));
            lista.splice(i, 1);
            localStorage.setItem('noticias', JSON.stringify(lista));
            renderAdmin();
        }
        renderAdmin();
    </script>
</body>
</html>
