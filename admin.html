<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Zero - Admin</title>
    <style>
        :root { --primary: #00d4ff; --owner: #ffcf40; --bg: #0a0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .sidebar { width: 200px; height: 100vh; background: #0d1117; border-right: 1px solid #30363d; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .badge { background: var(--owner); color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; }
        .xp-bar { height: 20px; background: #30363d; border-radius: 10px; margin-top: 20px; position: relative; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--primary); width: 0%; transition: 2s width; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>CONTROLE</h3>
        <p onclick="location.href='home.html'" style="cursor:pointer">🏠 Home</p>
        <p onclick="location.href='index.html'" style="color:red; cursor:pointer">🚪 Sair</p>
    </div>
    <div class="main">
        <h1>Painel do Criador <span class="badge">OWNER</span></h1>
        <p>Nível da Guilda: <span id="lvl">1</span></p>
        <div class="xp-bar"><div class="xp-fill" id="fill"></div></div>
        <button onclick="subirNivel()">GERAR EXPERIÊNCIA</button>
    </div>
    <script>
        if(localStorage.getItem('usuarioLogado') !== 'OWNER') {
            alert("ACESSO NEGADO!"); window.location.href = 'index.html';
        }
        function subirNivel() {
            document.getElementById('fill').style.width = "100%";
            setTimeout(() => { 
                document.getElementById('lvl').innerText = "99";
                alert("NÍVEL MÁXIMO ATINGIDO!");
            }, 2000);
        }
    </script>
</body>
</html>
