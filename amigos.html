<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --sidebar: #0d1117; --card: #161b22; --success: #238636; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL (Padrão da sua Home) */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        /* CONTEÚDO PRINCIPAL */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .grid-amigos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; }
        
        .user-card { 
            background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #30363d; 
            text-align: center; transition: 0.3s; 
        }
        .user-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .user-card img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; background: #000; object-fit: cover; }
        
        .btn-add { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            background: var(--primary); color: black; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-added { background: var(--success); color: white; cursor: default; }
        
        h1 { margin-bottom: 10px; }
        p { color: #8b949e; margin-bottom: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">THE NULL POINT</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Meu Perfil</div>
        <div class="nav-box active">👥 Amigos</div>
        <div class="nav-box" onclick="alert('Sistema de Guildas em breve!')">🛡️ Guildas</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Top Ranking</div>
        <div class="nav-box" style="margin-top: auto; color: #f85149;" onclick="localStorage.clear(); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <h1>Explorar Membros</h1>
        <p>Encontre novos aliados para fortalecer a guilda The Originals.</p>

        <div class="grid-amigos" id="displayAmigos">
            </div>
    </main>

    <script>
        // Membros simulados
        const membros = [
            { id: 101, nome: "Nicolas Testa", foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nicolas" },
            { id: 102, nome: "Sarah Hunter", foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" },
            { id: 103, nome: "Cyber_Zero", foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" },
            { id: 104, nome: "Dark_Soul", foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Shadow" }
        ];

        function carregarAmigos() {
            const container = document.getElementById('displayAmigos');
            const listaAmigos = JSON.parse(localStorage.getItem('meusAmigos')) || [];

            container.innerHTML = membros.map(m => {
                const jaAdicionado = listaAmigos.includes(m.id);
                return `
                    <div class="user-card">
                        <img src="${m.foto}" alt="Avatar">
                        <h3>${m.nome}</h3>
                        <button class="btn-add ${jaAdicionado ? 'btn-added' : ''}" onclick="adicionar(${m.id})">
                            ${jaAdicionado ? '✅ Solicitado' : 'Adicionar Amigo'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function adicionar(id) {
            let listaAmigos = JSON.parse(localStorage.getItem('meusAmigos')) || [];
            if(!listaAmigos.includes(id)) {
                listaAmigos.push(id);
                localStorage.setItem('meusAmigos', JSON.stringify(listaAmigos));
                carregarAmigos();
            }
        }

        carregarAmigos();
    </script>
</body>
</html>
