<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Null Point - Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --gold: #ffcf40; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary); }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* NOTIFICAÇÃO (O PULINHO) */
        #notification-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .notification { 
            background: var(--card); border-left: 4px solid var(--primary); color: white; padding: 15px; 
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; 
            gap: 12px; animation: slideIn 0.5s ease-out forwards; border: 1px solid #333; min-width: 250px; 
        }
        .notification.ban { border-left-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* CARDS DO FEED */
        .news-card { background: var(--card); border: 1px solid #333; border-radius: 15px; margin-bottom: 20px; padding: 20px; }
        .news-card h2 { color: var(--primary); margin: 0 0 10px 0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">THE NULL POINT</div>
        <div class="nav-box active" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Meu Perfil</div>
        <div class="nav-box" onclick="location.href='guildas.html'">🛡️ Guildas</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Ranking</div>
        <div class="nav-box" onclick="location.href='admin.html'">👑 Admin</div>
    </aside>

    <main class="main-content">
        <h1>Transmissões Recentes 📡</h1>
        <div id="feed"></div>
    </main>

    <div id="notification-container"></div>

    <script>
        // 1. Lógica para carregar as notícias
        function carregarFeed() {
            const feed = document.getElementById('feed');
            const noticias = JSON.parse(localStorage.getItem('noticias')) || [];
            if(noticias.length === 0) {
                feed.innerHTML = "<p style='color:gray'>Nenhuma transmissão no momento...</p>";
                return;
            }
            feed.innerHTML = noticias.map(n => `
                <div class="news-card">
                    <small style="color:gray">${n.data}</small>
                    <h2>${n.titulo}</h2>
                    <p>${n.texto}</p>
                </div>
            `).join('');
        }

        // 2. Lógica das Notificações (O Pulinho)
        function spawnNotif(msg, tipo) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = `notification ${tipo}`;
            notif.innerHTML = `<span>${tipo === 'ban' ? '🚫' : '📡'}</span> <div><b>SISTEMA</b><br>${msg}</div>`;
            container.appendChild(notif);
            setTimeout(() => { notif.style.opacity = '0'; setTimeout(() => notif.remove(), 500); }, 4000);
        }

        // VIGILANTE: Checa se algo mudou no Admin
        let totalNoticias = (JSON.parse(localStorage.getItem('noticias')) || []).length;
        let totalBanidos = (JSON.parse(localStorage.getItem('banidos')) || []).length;

        setInterval(() => {
            const nAtual = (JSON.parse(localStorage.getItem('noticias')) || []).length;
            const bAtual = (JSON.parse(localStorage.getItem('banidos')) || []).length;

            if (nAtual > totalNoticias) {
                spawnNotif("Nova notícia postada no Ponto Zero!", "news");
                totalNoticias = nAtual;
                carregarFeed(); // Atualiza o feed na hora sem dar F5
            }
            if (bAtual > totalBanidos) {
                spawnNotif("Um usuário foi banido permanentemente.", "ban");
                totalBanidos = bAtual;
            }
        }, 2000);

        carregarFeed();
    </script>
</body>
</html>
