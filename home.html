<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Null Point - Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .navbar { display: flex; justify-content: space-between; padding: 15px 5%; background: #0d1117; border-bottom: 1px solid #30363d; }
        .btn-logout { background: none; border: 1px solid #f85149; color: #f85149; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .hero { height: 300px; background: linear-gradient(transparent, #0a0e14), url('https://picsum.photos/1200/400?tech'); background-size: cover; display: flex; align-items: flex-end; padding: 40px 5%; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-weight:900;">THE NULL <span style="color:var(--primary)">POINT</span></div>
        <div>
            <span id="nomeUser">...</span>
            <button class="btn-logout" onclick="location.href='index.html'">Sair</button>
        </div>
    </nav>
    <div class="hero"><h1>Últimas Notícias da Guilda</h1></div>
    <script>
        document.getElementById('nomeUser').innerText = "Olá, " + (localStorage.getItem('usuarioLogado') || 'Viajante');
    </script>
</body>
</html>
