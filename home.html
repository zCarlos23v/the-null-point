<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Null Point - Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(10, 14, 20, 0.95);
            position: sticky; top: 0; border-bottom: 1px solid #30363d; z-index: 1000;
        }
        .logo-nav { font-weight: 900; }
        .logo-nav span { color: var(--primary); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: none; border: 1px solid #f85149; color: #f85149; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .hero-news {
            height: 40vh; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.9)), url('https://picsum.photos/1200/600?geek');
            margin: 20px 5%; border-radius: 20px; display: flex; align-items: flex-end; padding: 40px; border: 1px solid #30363d;
        }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; }
        .news-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; }
        .news-card:hover { transform: translateY(-10px); border-color: var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-nav">THE NULL <span>POINT</span></div>
        <div class="user-info">
            <span id="nomeUser">Carregando...</span>
            <button class="btn-logout" onclick="location.href='index.html'">Sair</button>
        </div>
    </nav>
    <div class="hero-news">
        <h1>Bem-vindo ao Ponto Zero das Notícias</h1>
    </div>
    <div class="news-grid">
        <div class="news-card"><div style="height:150px; background:#30363d"></div><div style="padding:15px"><h3>Novidades na Guilda</h3><p>O sistema de login foi atualizado.</p></div></div>
        <div class="news-card"><div style="height:150px; background:#30363d"></div><div style="padding:15px"><h3>Mundo Geek</h3><p>As melhores notícias chegam aqui.</p></div></div>
    </div>
    <script>
        document.getElementById('nomeUser').innerText = "Olá, " + (localStorage.getItem('usuarioLogado') || 'Viajante');
    </script>
</body>
</html>
