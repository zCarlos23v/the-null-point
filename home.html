<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Null Point - Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --gold: #ffcf40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #0d1117; border-bottom: 1px solid #30363d; position: sticky; top:0; z-index:100; }
        .main-layout { display: grid; grid-template-columns: 1fr 300px; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 20px; }
        .search-area { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; color: white; }
        .news-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        .guild-sidebar { background: #0d1117; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); height: fit-content; }
        .badge-owner { background: var(--gold); color: black; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; }
        .user-link { cursor: pointer; background: #21262d; padding: 8px 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-weight:900;">THE NULL POINT</div>
        <div class="user-link" onclick="location.href='perfil.html'">
            <span id="nomeUser">...</span> 👤
        </div>
    </nav>

    <div class="main-layout">
        <section>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="🔍 Pesquisar notícia..." onkeyup="exibir(this.value)">
            </div>
            <div id="feedNoticias"></div>
        </section>

        <aside>
            <div class="guild-sidebar">
                <h3 style="color: var(--gold); margin-top:0;">🛡️ GUILDA OFICIAL</h3>
                <p><b>Nome:</b> The Originals</p>
                <p><b>Líder:</b> Carlos <span class="badge-owner">OWNER</span></p>
                <hr style="border: 0.5px solid #30363d;">
                <p style="font-size: 0.9rem; color: #8b949e;">Status: Recrutamento Fechado</p>
                <button style="width:100%; padding:10px; background:transparent; border: 1px solid var(--primary); color: var(--primary); border-radius:8px; cursor:not-allowed;">PEDIR PARA ENTRAR</button>
            </div>
        </aside>
    </div>

    <script>
        document.getElementById('nomeUser').innerText = "Olá, " + (localStorage.getItem('usuarioLogado') || 'Viajante');

        function exibir(filtro = "") {
            const feed = document.getElementById('feedNoticias');
            const lista = JSON.parse(localStorage.getItem('noticias')) || [];
            const filtradas = lista.filter(n => n.titulo.toLowerCase().includes(filtro.toLowerCase()));

            if(filtradas.length === 0) {
                feed.innerHTML = "<p style='color:#8b949e;'>Nenhuma notícia encontrada.</p>";
                return;
            }

            feed.innerHTML = filtradas.map(n => `
                <div class="news-card">
                    <small style="color:#8b949e;">${n.data}</small>
                    <h2 style="color:var(--primary); margin:10px 0;">${n.titulo}</h2>
                    <p>${n.texto}</p>
                </div>
            `).join('');
        }
        exibir();
    </script>
</body>
</html>
