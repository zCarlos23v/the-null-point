<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .login-card { 
            background: var(--card); padding: 40px; border-radius: 20px; 
            border: 1px solid #30363d; width: 350px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; 
            border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 12px; background: var(--primary); color: black; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .error { color: #f85149; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">THE NULL POINT</div>
        <p>Acesse o Universo</p>
        
        <input type="text" id="user" placeholder="Nome de Usuário">
        <input type="password" id="pass" placeholder="Sua Senha">
        
        <button onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
        <div id="msgErro" class="error">Usuário banido ou senha incorreta!</div>
    </div>

    <script>
        // SEGURANÇA: Verifica banimento antes de tudo
        function verificarBan(nome) {
            const banidos = JSON.parse(localStorage.getItem('banidos')) || [];
            if (banidos.includes(nome)) {
                location.href = 'banido.html';
                return true;
            }
            return false;
        }

        function fazerLogin() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value;
            const erro = document.getElementById('msgErro');

            if(!user || !pass) return;

            // 1. Verifica se o cara é um banido tentando voltar
            if (verificarBan(user)) return;

            // 2. Lógica de Login (Simulada para o seu uso)
            // Se for o seu nome, a gente já define como o Supremo Criador
            localStorage.setItem('usuarioLogado', user);
            
            if(user.toLowerCase() === 'carlos') {
                localStorage.setItem('cargo', 'Supremo Criador 👑');
            } else {
                localStorage.setItem('cargo', 'Membro da Guilda');
            }

            location.href = 'home.html';
        }

        // Se já estiver logado, verifica se foi banido enquanto navegava
        const logado = localStorage.getItem('usuarioLogado');
        if(logado) verificarBan(logado);
    </script>
</body>
</html>
