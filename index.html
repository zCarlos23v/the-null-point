<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Null Point - Acesso</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card-bg: #11161d; }
        body { 
            background: var(--bg); display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: sans-serif; color: white;
        }
        .card { 
            background: var(--card-bg); width: 90%; max-width: 400px; padding: 40px; 
            border-radius: 20px; border: 1px solid #30363d; text-align: center;
        }
        .logo { font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; }
        .accent { color: var(--primary); }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; 
            border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box;
        }
        .btn-glow { 
            width: 100%; padding: 15px; background: #238636; border: none; border-radius: 10px; 
            color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .link-switch { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 0.9rem; margin-top: 15px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h1 class="logo">THE NULL <span class="accent">POINT</span></h1>
        <p style="color: #8b949e;">Acesse o Ponto Zero.</p>
        <input type="text" id="user" placeholder="Usuário (admin)">
        <input type="password" id="pass" placeholder="Senha (1234)">
        <button class="btn-glow" onclick="entrar()">ENTRAR NO UNIVERSO</button>
        <br>
        <span class="link-switch" onclick="document.getElementById('loginBox').classList.add('hidden'); document.getElementById('registerBox').classList.remove('hidden');">Criar nova conta</span>
    </div>

    <div class="card hidden" id="registerBox">
        <h1 class="logo">NOVA <span class="accent">GUILDA</span></h1>
        <input type="text" placeholder="Nome Completo">
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button class="btn-glow" style="background: var(--primary); color: black;" onclick="location.reload()">FINALIZAR CADASTRO</button>
        <br>
        <span class="link-switch" onclick="location.reload()">Voltar</span>
    </div>

    <script>
        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u.toLowerCase() === 'admin' && p === '1234') {
                localStorage.setItem('usuarioLogado', 'Carlos'); 
                localStorage.setItem('cargo', 'Supremo Criador 👑');
                window.location.href = 'admin.html';
            } else if (u !== "" && p !== "") {
                localStorage.setItem('usuarioLogado', u);
                localStorage.setItem('cargo', 'Membro da Guilda');
                window.location.href = 'home.html';
            } else {
                alert("Preencha os campos!");
            }
        }
    </script>
</body>
</html>
