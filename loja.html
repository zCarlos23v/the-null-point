<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Negro - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --gold: #ffcf40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); text-transform: uppercase; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--gold); background: rgba(255, 207, 64, 0.1); }

        /* CONTEÚDO */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .header-loja { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        
        .xp-display { background: rgba(0, 212, 255, 0.1); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary); font-weight: bold; color: var(--primary); }

        /* Grid da Loja */
        .grid-loja { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .item-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .item-icon { width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: #0d1117; border: 2px dashed #333; }
        .item-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .item-price { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; display: block; }
        
        .btn-comprar { width: 100%; padding: 10px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-comprar:disabled { background: #333; color: #777; cursor: not-allowed; }

        /* NOTIFICAÇÃO (PULINHO) */
        #notification-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .notification { background: var(--card); border-left: 4px solid var(--primary); padding: 15px; border-radius: 8px; animation: slideIn 0.5s forwards; border: 1px solid #333; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">The Null Point</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Perfil</div>
        <div class="nav-box active">💎 Mercado Negro</div>
        <div class="nav-box" onclick="location.href='guildas.html'">🛡️ Guildas</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Ranking</div>
        <div class="nav-box" onclick="location.href='admin.html'">👑 Admin</div>
    </aside>

    <main class="main-content">
        <div class="header-loja">
            <div>
                <h1>Mercado Negro 💎</h1>
                <p style="color: #8b949e;">Troque o seu XP por prestígio e cosméticos.</p>
            </div>
            <div class="xp-display">Seu Saldo: <span id="meuXP">0</span> XP</div>
        </div>

        <div class="grid-loja">
            <div class="item-card">
                <div class="item-icon" style="border-color: var(--gold); color: var(--gold);">✨</div>
                <span class="item-name">Moldura Dourada</span>
                <span class="item-price">Custo: 1500 XP</span>
                <button class="btn-comprar" onclick="comprar('Moldura Dourada', 1500)">ADQUIRIR</button>
            </div>

            <div class="item-card">
                <div class="item-icon" style="border-color: #f85149; color: #f85149;">🔥</div>
                <span class="item-name">Título: "Mercenário"</span>
                <span class="item-price">Custo: 800 XP</span>
                <button class="btn-comprar" onclick="comprar('Título Mercenário', 800)">ADQUIRIR</button>
            </div>

            <div class="item-card">
                <div class="item-icon" style="border-color: #a371f7; color: #a371f7;">👾</div>
                <span class="item-name">Nome Roxo no Chat</span>
                <span class="item-price">Custo: 2000 XP</span>
                <button class="btn-comprar" onclick="comprar('Nome Roxo', 2000)">ADQUIRIR</button>
            </div>
        </div>
    </main>

    <div id="notification-container"></div>

    <script>
        // Pega o XP do utilizador (Simulado em 3000 para teste, no real vem do Ranking)
        let xpAtual = parseInt(localStorage.getItem('meuXP')) || 3000;
        document.getElementById('meuXP').innerText = xpAtual;

        function comprar(item, preco) {
            if (xpAtual >= preco) {
                xpAtual -= preco;
                localStorage.setItem('meuXP', xpAtual);
                document.getElementById('meuXP').innerText = xpAtual;
                
                // Salva o item no inventário
                let inventario = JSON.parse(localStorage.getItem('inventario')) || [];
                inventario.push(item);
                localStorage.setItem('inventario', JSON.stringify(inventario));

                spawnNotif("Compra realizada: " + item + "!", "news");
            } else {
                alert("XP Insuficiente! Continue explorando o Ponto Zero.");
            }
        }

        function spawnNotif(msg, tipo) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `<b>SUCESSO</b><br>${msg}`;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }
    </script>
</body>
</html>
