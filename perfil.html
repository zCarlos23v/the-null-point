<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --gold: #ffcf40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL PADRÃO CARLOS */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); text-transform: uppercase; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        /* CONTEÚDO CENTRALIZADO */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle at center, #111, #0a0e14); }
        
        .perfil-card { 
            background: var(--card); padding: 40px; border-radius: 25px; border: 1px solid #30363d; 
            text-align: center; width: 100%; max-width: 380px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .avatar-container { position: relative; width: 140px; height: 140px; margin: 0 auto 25px; }
        #imgPerfil { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--primary); background: #000; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .badge-cargo { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            border: 1px solid var(--gold); color: var(--gold); 
            font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;
            background: rgba(255, 207, 64, 0.05);
        }

        h2 { margin: 10px 0; font-size: 1.8rem; letter-spacing: 1px; }
        .bio { color: #8b949e; font-style: italic; margin-bottom: 30px; line-height: 1.4; }

        .btn-edit { 
            background: #21262d; border: 1px solid #30363d; color: white; 
            padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; 
            font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-edit:hover { border-color: var(--primary); background: #30363d; transform: translateY(-2px); }

        /* MODAL DE EDIÇÃO */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 350px; }
        input, textarea { width:100%; padding:12px; margin:10px 0; background:#0d1117; border:1px solid #333; color:white; border-radius:8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">The Null Point</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box active">👤 Meu Perfil</div>
        <div class="nav-box" onclick="location.href='amigos.html'">👥 Amigos</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Top Ranking</div>
        <div class="nav-box" onclick="location.href='admin.html'">👑 Painel Admin</div>
        <div class="nav-box" style="margin-top: auto; color: #f85149;" onclick="localStorage.clear(); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <div class="perfil-card">
            <div class="avatar-container">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Carlos" id="imgPerfil">
            </div>
            
            <div id="areaCargo">
                <span class="badge-cargo">Supremo Criador</span>
            </div>

            <h2 id="nomeDisplay">Carlos</h2>
            <p class="bio" id="bioDisplay">Defina sua bio no botão abaixo...</p>

            <button class="btn-edit" onclick="abrirModal()">⚙️ Editar Perfil</button>
        </div>
    </main>

    <div class="modal" id="modalEdicao">
        <div class="modal-content">
            <h3>Editar Identidade</h3>
            <input type="text" id="editNome" placeholder="Seu nome">
            <input type="text" id="editFoto" placeholder="URL da Foto (opcional)">
            <textarea id="editBio" placeholder="Sua bio..."></textarea>
            <button class="btn-edit" style="background:var(--primary); color:black;" onclick="salvar()">Salvar Alterações</button>
            <button class="btn-edit" style="margin-top:10px;" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script>
        function abrirModal() {
            document.getElementById('modalEdicao').style.display = 'flex';
            document.getElementById('editNome').value = localStorage.getItem('usuarioLogado') || "";
            document.getElementById('editBio').value = localStorage.getItem('bio') || "";
        }

        function fecharModal() { document.getElementById('modalEdicao').style.display = 'none'; }

        function salvar() {
            const novoNome = document.getElementById('editNome').value;
            const novaBio = document.getElementById('editBio').value;
            const novaFoto = document.getElementById('editFoto').value;

            if(novoNome) localStorage.setItem('usuarioLogado', novoNome);
            if(novaBio) localStorage.setItem('bio', novaBio);
            if(novaFoto) localStorage.setItem('foto', novaFoto);

            fecharModal();
            carregarDados();
        }

        function carregarDados() {
            const nome = localStorage.getItem('usuarioLogado') || "Viajante";
            const bio = localStorage.getItem('bio') || "Nenhuma biografia definida.";
            const foto = localStorage.getItem('foto');

            document.getElementById('nomeDisplay').innerText = nome;
            document.getElementById('bioDisplay').innerText = bio;
            if(foto) document.getElementById('imgPerfil').src = foto;
            
            // Se for o Carlos, mantém o cargo de Supremo
            if(nome.toLowerCase() === 'carlos') {
                document.getElementById('areaCargo').innerHTML = '<span class="badge-cargo">Supremo Criador</span>';
            } else {
                document.getElementById('areaCargo').innerHTML = '<span class="badge-cargo" style="border-color:#8b949e; color:#8b949e;">Membro</span>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
