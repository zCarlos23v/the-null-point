<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --card: #161b22; --sidebar: #0d1117; --gold: #ffcf40; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); text-transform: uppercase; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        /* CONTEÚDO CENTRAL */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .perfil-card { 
            background: var(--card); padding: 40px; border-radius: 25px; border: 1px solid #30363d; 
            text-align: center; width: 100%; max-width: 400px; position: relative;
        }
        
        /* Avatar com Suporte a Moldura da Loja */
        .avatar-wrapper { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; }
        #imgPerfil { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--primary); background: #000; transition: 0.5s;
        }
        
        .badge-cargo { 
            display: inline-block; padding: 5px 15px; border-radius: 20px; 
            border: 1px solid var(--gold); color: var(--gold); font-size: 0.8rem; 
            font-weight: bold; margin-bottom: 10px; background: rgba(255, 207, 64, 0.05);
        }

        h2 { margin: 10px 0; font-size: 1.8rem; }
        .titulo-comprado { color: var(--danger); font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .bio { color: #8b949e; font-style: italic; margin-bottom: 25px; line-height: 1.4; }

        .btn-acao { 
            background: #21262d; border: 1px solid #30363d; color: white; 
            padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; 
            font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        .btn-acao:hover { border-color: var(--primary); background: #30363d; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 350px; }
        input, textarea { width:100%; padding:12px; margin:10px 0; background:#0d1117; border:1px solid #333; color:white; border-radius:8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">The Null Point</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed</div>
        <div class="nav-box active">👤 Perfil</div>
        <div class="nav-box" onclick="location.href='loja.html'">💎 Mercado Negro</div>
        <div class="nav-box" onclick="location.href='guildas.html'">🛡️ Guildas</div>
        <div class="nav-box" onclick="location.href='ranking.html'">📈 Ranking</div>
        <div class="nav-box" onclick="location.href='admin.html'">👑 Admin</div>
    </aside>

    <main class="main-content">
        <div class="perfil-card">
            <div class="avatar-wrapper">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Carlos" id="imgPerfil">
            </div>
            
            <span class="badge-cargo" id="badgeCargo">Membro</span>
            <span class="titulo-comprado" id="txtTitulo"></span>

            <h2 id="nomeDisplay">Usuário</h2>
            <p class="bio" id="bioDisplay">Carregando bio...</p>

            <button class="btn-acao" onclick="abrirModal()">⚙️ CONFIGURAR PERFIL</button>
            <button class="btn-acao" style="color:var(--danger)" onclick="logout()">🚪 SAIR DO SISTEMA</button>
        </div>
    </main>

    <div class="modal" id="modalEdicao">
        <div class="modal-content">
            <h3 style="margin-top:0">Editar Identidade</h3>
            <input type="text" id="editNome" placeholder="Seu Nome">
            <input type="text" id="editFoto" placeholder="URL da nova foto (Link)">
            <textarea id="editBio" placeholder="Escreva sua nova bio..."></textarea>
            <button class="btn-acao" style="background:var(--primary); color:black; border:none;" onclick="salvar()">SALVAR MUDANÇAS</button>
            <button class="btn-acao" onclick="fecharModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        function abrirModal() {
            document.getElementById('modalEdicao').style.display = 'flex';
            document.getElementById('editNome').value = localStorage.getItem('usuarioLogado') || "";
            document.getElementById('editBio').value = localStorage.getItem('bio') || "";
        }

        function fecharModal() { document.getElementById('modalEdicao').style.display = 'none'; }

        function salvar() {
            const nome = document.getElementById('editNome').value;
            const bio = document.getElementById('editBio').value;
            const foto = document.getElementById('editFoto').value;

            if(nome) localStorage.setItem('usuarioLogado', nome);
            if(bio) localStorage.setItem('bio', bio);
            if(foto) localStorage.setItem('foto', foto);

            fecharModal();
            carregarPerfil();
        }

        function carregarPerfil() {
            const nome = localStorage.getItem('usuarioLogado') || "Viajante";
            const bio = localStorage.getItem('bio') || "Sem biografia definida.";
            const foto = localStorage.getItem('foto');
            const inventario = JSON.parse(localStorage.getItem('inventario')) || [];

            document.getElementById('nomeDisplay').innerText = nome;
            document.getElementById('bioDisplay').innerText = bio;
            
            // 🛡️ APLICA ITENS DA LOJA
            const img = document.getElementById('imgPerfil');
            if(inventario.includes('Moldura Dourada')) {
                img.style.borderColor = 'var(--gold)';
                img.style.boxShadow = '0 0 25px rgba(255, 207, 64, 0.4)';
            }
            if(inventario.includes('Título Mercenário')) {
                document.getElementById('txtTitulo').innerText = "⚡ MERCENÁRIO ⚡";
            }
            if(inventario.includes('Nome Roxo')) {
                document.getElementById('nomeDisplay').style.color = '#a371f7';
            }

            // 👑 CARGO DE SUPREMO
            if(nome.toLowerCase() === 'carlos') {
                document.getElementById('badgeCargo').innerText = "SUPREMO CRIADOR";
                document.getElementById('badgeCargo').style.borderColor = "var(--gold)";
            }

            if(foto) img.src = foto;
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            location.href = 'index.html';
        }

        carregarPerfil();
    </script>
</body>
</html>
