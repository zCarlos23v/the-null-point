<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Ranking - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --sidebar: #0d1117; --card: #161b22; --gold: #ffcf40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL PADRÃO CARLOS */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); text-transform: uppercase; }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        /* CONTEÚDO */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .ranking-container { max-width: 900px; margin: 0 auto; }
        
        /* Header do Ranking */
        .ranking-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .ranking-header h1 { margin: 0; font-size: 2.5rem; }

        .timer-info { background: rgba(255, 207, 64, 0.05); border: 1px solid var(--gold); padding: 12px; border-radius: 12px; color: var(--gold); text-align: center; margin-bottom: 25px; font-weight: bold; }

        /* Estilo dos Itens do Ranking (Igual à sua imagem) */
        .ranking-item { 
            display: flex; align-items: center; background: var(--card); padding: 15px 30px; 
            border-radius: 20px; margin-bottom: 12px; border: 1px solid #30363d; transition: 0.3s;
        }
        .ranking-item:hover { transform: scale(1.01); border-color: var(--primary); background: #1c2128; }
        
        .pos { width: 50px; font-weight: 900; font-size: 1.4rem; color: #8b949e; }
        .pos-1 { color: var(--gold); text-shadow: 0 0 10px rgba(255, 207, 64, 0.3); }
        
        .user-info { flex: 1; display: flex; align-items: center; gap: 20px; }
        .user-info img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; background: #000; }
        .user-data b { font-size: 1.1rem; display: block; }
        .user-data small { color: #8b949e; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem; }
        
        /* Barras de XP */
        .xp-section { display: flex; align-items: center; gap: 15px; width: 300px; }
        .xp-bar-bg { flex: 1; height: 10px; background: #0d1117; border-radius: 5px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: 1.5s ease-in-out; }
        .xp-val { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: var(--primary); min-width: 70px; text-align: right; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">THE NULL POINT</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Meu Perfil</div>
        <div class="nav-box" onclick="location.href='amigos.html'">👥 Amigos</div>
        <div class="nav-box active">📈 Top Ranking</div>
        <div class="nav-box" onclick="location.href='admin.html'">👑 Painel Admin</div>
        <div class="nav-box" style="margin-top: auto; color: #f85149;" onclick="localStorage.removeItem('usuarioLogado'); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <div class="ranking-container">
            <div class="ranking-header">
                <h1>Top Ranking 📈</h1>
            </div>

            <div class="timer-info">
                🔄 Próxima atualização em: <span id="timer">60s</span>
            </div>

            <div id="listaRanking">
                </div>
        </div>
    </main>

    <script>
        // Dados dos outros membros
        let membrosBase = [
            { nome: "Nicolas Testa", xp: 4547, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nicolas", cargo: "Membro" },
            { nome: "Sarah Hunter", xp: 3801, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah", cargo: "Membro" },
            { nome: "Shadow_M", xp: 3245, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Shadow", cargo: "Membro" },
            { nome: "Zero_Cool", xp: 2920, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix", cargo: "Membro" }
        ];

        let tempo = 60;

        function renderizar() {
            let listaFinal = [...membrosBase];

            // SISTEMA DE VISIBILIDADE DO CRIADOR
            const mostrarCriador = localStorage.getItem('mostrarCriadorNoRanking') === 'true';
            const nomeLogado = localStorage.getItem('usuarioLogado') || "";

            if (mostrarCriador && nomeLogado.toLowerCase() === 'carlos') {
                // Se você ligou a chave no admin, você entra na lista
                listaFinal.push({
                    nome: "Carlos",
                    xp: 9999, // Ou use o XP que você quiser salvar
                    foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Carlos",
                    cargo: "OWNER"
                });
            }

            // Ordena do maior para o menor XP
            listaFinal.sort((a, b) => b.xp - a.xp);

            const container = document.getElementById('listaRanking');
            container.innerHTML = listaFinal.map((m, i) => `
                <div class="ranking-item">
                    <div class="pos ${i === 0 ? 'pos-1' : ''}">${i + 1}º</div>
                    <div class="user-info">
                        <img src="${m.foto}">
                        <div class="user-data">
                            <b>${m.nome}</b>
                            <small>${m.cargo}</small>
                        </div>
                    </div>
                    <div class="xp-section">
                        <div class="xp-bar-bg">
                            <div class="xp-bar-fill" style="width: ${(m.xp / 10000) * 100}%"></div>
                        </div>
                        <div class="xp-val">${m.xp} XP</div>
                    </div>
                </div>
            `).join('');
        }

        // Loop de atualização (simula movimento no XP dos bots)
        setInterval(() => {
            tempo--;
            if(tempo <= 0) {
                tempo = 60;
                membrosBase.forEach(m => m.xp += Math.floor(Math.random() * 20));
                renderizar();
            }
            document.getElementById('timer').innerText = tempo + "s";
        }, 1000);

        // Inicia
        renderizar();
    </script>
</body>
</html>
