<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Ranking - The Null Point</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e14; --sidebar: #0d1117; --card: #161b22; --gold: #ffcf40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL PADRÃO CARLOS */
        .sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; gap: 10px; }
        .logo { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; text-align: center; color: var(--primary); }
        .nav-box { background: #21262d; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
        .nav-box:hover { background: #30363d; border-color: var(--primary); }
        .nav-box.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); }

        /* CONTEÚDO */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .ranking-container { max-width: 800px; margin: 0 auto; }
        
        .timer-info { background: rgba(255, 207, 64, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 10px; color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 0.9rem; }

        .ranking-item { 
            display: flex; align-items: center; background: var(--card); padding: 15px 25px; 
            border-radius: 15px; margin-bottom: 10px; border: 1px solid #30363d; transition: 0.3s;
        }
        .ranking-item:hover { transform: scale(1.02); border-color: var(--primary); }
        .pos { width: 40px; font-weight: 900; font-size: 1.2rem; color: #8b949e; }
        .pos-1 { color: var(--gold); }
        
        .user-info { flex: 1; display: flex; align-items: center; gap: 15px; }
        .user-info img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        
        .xp-bar-bg { width: 150px; height: 8px; background: #0d1117; border-radius: 4px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--primary); transition: 1s; }
        .xp-text { font-size: 0.8rem; color: var(--primary); margin-left: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">THE NULL POINT</div>
        <div class="nav-box" onclick="location.href='home.html'">🏠 Feed Global</div>
        <div class="nav-box" onclick="location.href='perfil.html'">👤 Meu Perfil</div>
        <div class="nav-box" onclick="location.href='amigos.html'">👥 Amigos</div>
        <div class="nav-box" onclick="alert('Guildas em breve!')">🛡️ Guildas</div>
        <div class="nav-box active">📈 Top Ranking</div>
        <div class="nav-box" style="margin-top: auto; color: #f85149;" onclick="localStorage.clear(); location.href='index.html'">🚪 Sair</div>
    </aside>

    <main class="main-content">
        <div class="ranking-container">
            <h1>Top Ranking 📈</h1>
            <div class="timer-info">🔄 Próxima atualização em: <b id="timer">60s</b></div>

            <div id="listaRanking">
                </div>
        </div>
    </main>

    <script>
        // Dados iniciais (O Carlos é fixo no topo)
        let membros = [
            { nome: "Carlos", xp: 9999, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Carlos", cargo: "OWNER" },
            { nome: "Nicolas Testa", xp: 4500, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nicolas" },
            { nome: "Sarah Hunter", xp: 3800, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" },
            { nome: "Shadow_M", xp: 3200, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Shadow" },
            { nome: "Zero_Cool", xp: 2900, foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" }
        ];

        let tempo = 60;

        function atualizarRanking() {
            // Simula outros membros ganhando XP (exceto o Carlos que já é o máximo)
            membros.forEach(m => {
                if(m.nome !== "Carlos") {
                    m.xp += Math.floor(Math.random() * 50);
                }
            });

            // Reorganiza a lista (do maior XP para o menor)
            membros.sort((a, b) => b.xp - a.xp);

            const container = document.getElementById('listaRanking');
            container.innerHTML = membros.map((m, i) => `
                <div class="ranking-item">
                    <div class="pos ${i === 0 ? 'pos-1' : ''}">${i + 1}º</div>
                    <div class="user-info">
                        <img src="${m.foto}">
                        <div>
                            <b>${m.nome}</b><br>
                            <small style="color: #8b949e;">${m.cargo || 'Membro'}</small>
                        </div>
                    </div>
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" style="width: ${(m.xp / 10000) * 100}%"></div>
                    </div>
                    <div class="xp-text">${m.xp} XP</div>
                </div>
            `).join('');
        }

        // Timer de 1 minuto
        setInterval(() => {
            tempo--;
            if(tempo <= 0) {
                tempo = 60;
                atualizarRanking();
            }
            document.getElementById('timer').innerText = tempo + "s";
        }, 1000);

        atualizarRanking();
    </script>
</body>
</html>
